# dependabot PR 作成時にテストを実行し、レビュアーにリポジトリオーナーを設定する

name: Dependabot PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dependabot-pr-checks:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
        with:
          version: 11
          run_install: false

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test

      - name: Add repository owner as reviewer
        if: ${{ always() }}
        run: gh pr edit "$PR_URL" --add-reviewer "$OWNER"
        env:
          OWNER: ${{ github.repository_owner }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
